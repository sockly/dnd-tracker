<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D&D Party Tracker</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#1e1e1e;
    color:white;
    padding:20px;
}

h1{
    text-align:center;
}

.controls{
    text-align:center;
    margin-bottom:20px;
}

button{
    cursor:pointer;
    padding:8px 12px;
    border:none;
    border-radius:6px;
    margin:2px;
}

.primary{
    background:#4caf50;
    color:white;
}

.character-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:20px;
}

.card{
    background:#2f2f2f;
    border-radius:12px;
    padding:20px;
    box-shadow:0 0 10px rgba(0,0,0,.3);
}

.stat{
    margin:6px 0;
}

.conditions{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    margin-bottom:8px;
}

.condition{
    padding:3px 8px;
    border-radius:15px;
    font-size:12px;
    color:white;
}

.hp-bar{
    width:100%;
    max-width:1000px;
    height:20px;
    background:#555;
    border-radius:10px;
    overflow:hidden;
    margin-top:10px;
    margin-bottom:10px;
}

.hp-fill{
    height:100%;
    transition:
        width .3s,
        background-color .3s;
}

.resource{
    margin:8px 0;
}

.resource-dots{
    display:flex;
    gap:5px;
    margin-top:4px;
}

.dot{
    width:20px;
    height:20px;
    padding:1px;
    border-radius:50%;
    cursor:pointer;
    border:1px solid white;
}

.filled{
    background:white;
    opacity:75%;
}

.empty{
    background:transparent;
}

    .switch {
    position: relative;
    display: inline-block;
    width: 50px;
    height: 26px;
}

.switch input {
    opacity: 0;
    width: 0;
    height: 0;
}

.slider {
    position: absolute;
    inset: 0;
    background: #777;
    border-radius: 34px;
    transition: .3s;
    cursor: pointer;
}

.slider:before {
    position: absolute;
    content: "";
    height: 18px;
    width: 18px;
    left: 4px;
    bottom: 4px;
    background: white;
    border-radius: 50%;
    transition: .3s;
}

input:checked + .slider {
    background: #4caf50;
}

input:checked + .slider:before {
    transform: translateX(24px);
}

.toggle-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 8px 0;
}
.custom-field{
    margin:4px 0;
    color:#ddd;
}

input{
    padding:6px;
    margin:2px;
    width:70px;
}

.section-title{
    margin-top:15px;
    font-weight:bold;
}

.section-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    cursor:pointer;
}

.carrot{
    font-weight:bold;
}    

.card-footer{
    margin-top:15px;
    display:flex;
    flex-wrap:wrap;
    gap:6px;
}
</style>
</head>

<body>

<h1>D&D Party Tracker</h1>
     
<div class="controls">
    <button class="primary" onclick="addCharacter()">Add Character</button>
    <button onclick="sortInitiative()">Sort Initiative</button>
    <button onclick="longRestAll()">Long Rest</button>
    <button onclick="exportData()">Export Data</button>
    <button onclick="resetAllData()">Reset All Data</button>
</div>

<div id="partyContainer" class="character-grid"></div>
    
<script>

//Default Character//
    
let party = [];

function loadData() {
    const saved = localStorage.getItem("dndParty");

    if(saved){

    party = JSON.parse(saved);

party.forEach(character => {

    if(character.spellcaster === undefined){
        character.spellcaster = false;
    }

    if(!character.spellSlots){
        character.spellSlots = [];
    }

    if(!character.conditions){
        character.conditions = [];
    }

    if(!character.deathSaves){
        character.deathSaves = [
            false,
            false,
            false
        ];
    }

    if(!character.collapsed){
        character.collapsed = {
            spellcasting:false,
            resources:false,
            customFields:false,
            footer:false
        };
    }

});

        saveData();
        
    }
    else{
        party = [
            {
                id: Date.now(),
                name: "Rowan",
                hp:{
                    current:42,
                    max:42
                },
                ac:17,
                initiative:4,
                resources:[
                    {
                        name:"Class Feature",
                        current:2,
                        max:2
                    }
                ],
                customFields:[
                    {
                        label:"Passive Perception",
                        value:"16"
                    }
                ],
                spellcaster:false,
                spellSlots:[],
                
                conditions: [],
                deathSaves: [false, false, false],

                collapsed: {
                    spellcasting: false,
                    resources: false,
                    customFields: false,
                    footer: false
                    }
                }
        ];

        saveData();
    }
}

function saveData(){
    localStorage.setItem(
        "dndParty",
        JSON.stringify(party)
    );
}
    
function renderParty(){

    const container =
        document.getElementById("partyContainer");

    container.innerHTML = "";

    party.forEach(character =>{

    let conditionHTML = "";

character.conditions.forEach(
(condition,index)=>{

conditionHTML += `
<div
    class="condition"
    style="
        background:${condition.color}
    "
>
    ${condition.name}

    <span
        style="
            cursor:pointer;
            margin-left:5px;
        "
        onclick="
    removeCondition(
        ${character.id},
        ${index}
    )
"
    >
        ✕
    </span>
</div>
`;
});

let deathSaveHTML = "";

if(character.hp.current <= 0){

    deathSaveHTML = `
    <div class="section-title">
        Death Saves
    </div>

    <div class="resource-dots">

        ${
            character.deathSaves
            .map(
                (filled,index)=>`
            <div
                class="
                    dot
                    ${
                        filled
                        ? "filled"
                        : "empty"
                    }
                "
                onclick="
                    toggleDeathSave(
                        ${character.id},
                        ${index}
                    )
                "
            ></div>
            `
            )
            .join("")
        }

    </div>
    `;
}
        
        const hpPercent =
            (character.hp.current /
             character.hp.max) * 100;

        let hpColor = "#4caf50"; // Green


if(character.hp.current <= 0){

    hpColor = "#000000"; // Black

}
        
else if(character.hp.current === 1){

    hpColor = "#5a0000"; // Dark Red

}
else if(hpPercent < 25){

    hpColor = "#c62828"; // Red

}
else if(hpPercent < 50){

    hpColor = "#ef6c00"; // Orange

}
else if(hpPercent < 75){

    hpColor = "#fdd835"; // Yellow

}
    
else if(hpPercent >= 75){

    hpColor = "#4caf50"; // Yellow

}

        let resourcesHTML = "";

        character.resources.forEach((resource,index)=>{

            let dotsHTML = "";

            for(let i=0;i<resource.max;i++){

                const filled =
                    i < resource.current
                    ? "filled"
                    : "empty";

                dotsHTML += `
                    <div
                        class="dot ${filled}"
                        onclick="toggleResource(
                            ${character.id},
                            ${index},
                            ${i}
                        )">
                    </div>
                `;
            }

            resourcesHTML += `
                <div class="resource">
                    <strong>${resource.name}</strong>

<button
    style="background:#c62828;color:white;"
    onclick="
        removeResource(
            ${character.id},
            ${index}
        )
    "
>
    ✕
</button>

                    <div class="resource-dots">
                        ${dotsHTML}
                    </div>
                </div>
            `;
        });

        let customFieldsHTML = "";

        let spellSlotHTML = "";

if(
    character.spellcaster &&
    character.spellSlots &&
    character.spellSlots.length > 0
){

    character.spellSlots.forEach((slot,index)=>{

        let dotsHTML = "";

        for(let i=0;i<slot.max;i++){

            const filled =
                i < slot.current
                ? "filled"
                : "empty";

            dotsHTML += `
                <div
                    class="dot ${filled}"
                    onclick="
                        toggleSpellSlot(
                            ${character.id},
                            ${index},
                            ${i}
                        )
                    ">
                </div>
            `;
        }

        spellSlotHTML += `
            <div class="resource">
                <strong>
                    Level ${slot.level}
                </strong>

                <div class="resource-dots">
                    ${dotsHTML}
                </div>
            </div>
        `;
    });
}

        character.customFields.forEach((field,index)=>{

            customFieldsHTML += `
<div class="custom-field">
    ${field.label}: ${field.value}

    <button
        style="
            background:#c62828;
            color:white;
            margin-left:5px;
        "
        onclick="
            removeField(
                ${character.id},
                ${index}
            )
        "
    >
        ✕
    </button>
</div>
`;
        });
        
        const card = document.createElement("div");

        card.className = "card";

        card.innerHTML = `

            <h2>${character.name}</h2>
            
            <div class="conditions">
                ${conditionHTML}
            </div>

            <button onclick="addCondition(${character.id})">+</button>

            <div class="stat">
                HP: ${character.hp.current}/${character.hp.max}
            </div>

            <div class="hp-bar">
            <div
                class="hp-fill"
                style="
                    width:${hpPercent}%;
                    background:${hpColor};
                ">
            </div>
            </div>
            
            ${deathSaveHTML}

            <div class="stat">
                AC: ${character.ac}
            </div>

            <div class="stat">
                Initiative: +${character.initiative}
            </div>

            <div>
                <input
                    id="damage-${character.id}"
                    type="number"
                    placeholder="DMG"
                >

                <button onclick="
                    applyDamage(${character.id})
                ">
                    Damage
                </button>
            </div>

            <div>
                <input
                    id="heal-${character.id}"
                    type="number"
                    placeholder="Heal"
                >

                <button onclick="
                    healCharacter(${character.id})
                ">
                    Heal
                </button>
            </div>

<div
    class="section-header"
    onclick="
        toggleSection(${character.id},'spellcasting')
    ">
    <span>Spellcasting</span>

    <span class="carrot">
        ${
            character.collapsed.spellcasting
            ? "▶"
            : "▼"
        }
    </span>
</div>

${
!character.collapsed.spellcasting
? `
<div class="toggle-row">

    <span>
        Spellcaster:
        ${
            character.spellcaster
            ? "ON"
            : "OFF"
        }
    </span>

    <label class="switch">
        <input
            type="checkbox"
            ${
                character.spellcaster
                ? "checked"
                : ""
            }
            onchange="
                toggleSpellcaster(
                    ${character.id}
                )
            "
        >
        <span class="slider"></span>
    </label>

</div>

${spellSlotHTML}
`
: ""
}
            <div
    class="section-header"
    onclick="
        toggleSection(
            ${character.id},
            'resources'
        )
    "
>
    <span>Resources</span>

    <span class="carrot">
        ${
            character.collapsed.resources
            ? "▶"
            : "▼"
        }
    </span>
</div>

${
    !character.collapsed.resources
    ? resourcesHTML
    : ""
}

            <div
    class="section-header"
    onclick="
        toggleSection(
            ${character.id},
            'customFields'
        )
    "
>
    <span>Custom Fields</span>

    <span class="carrot">
        ${
            character.collapsed.customFields
            ? "▶"
            : "▼"
        }
    </span>
</div>

${
    !character.collapsed.customFields
    ? customFieldsHTML
    : ""
}

            <div class="card-footer">

            <button onclick="
                addResource(${character.id})
            ">
                + Resource
            </button>
        
            <button onclick="
                addField(${character.id})
            ">
                + Field
            </button>
        
            <button
                onclick="cloneCharacter(${character.id})"
                style="background:#1976d2;color:white;">
                Clone
            </button>
        
            <button
                onclick="deleteCharacter(${character.id})"
                style="background:#c62828;color:white;">
                Delete
            </button>

</div>
        `;

        container.appendChild(card);
    });
}

function applyDamage(id){

    const amount =
        Number(
            document.getElementById(
                `damage-${id}`
            ).value
        );

    if(!amount) return;

    const character =
        party.find(c=>c.id===id);

    character.hp.current -= amount;

    if(character.hp.current < 0){
        character.hp.current = 0;
    }

    saveData();
    renderParty();
}

function healCharacter(id){

    const amount =
        Number(
            document.getElementById(
                `heal-${id}`
            ).value
        );

    if(!amount) return;

    const character =
        party.find(c=>c.id===id);

    character.hp.current += amount;

    if(
        character.hp.current >
        character.hp.max
    ){
        character.hp.current =
            character.hp.max;
    }

    saveData();
    renderParty();
}

// New Character //
    
function addCharacter(){

    const name =
        prompt("Character Name");

    if(!name) return;

    const maxHP =
        Number(prompt("Max HP") || 10);

    const ac =
        Number(prompt("AC") || 10);

    const initiative =
        Number(prompt("Initiative Bonus") || 0);

    party.push({
    id:Date.now(),
    name,
    hp:{
        current:maxHP,
        max:maxHP
    },
    ac,
    initiative,
    resources:[],
    customFields:[],
    spellcaster:false,
    spellSlots:[],
    conditions: [],
    deathSaves: [
        false, 
        false, 
        false],
    collapsed: {
        spellcasting: false,
        resources: false,
        customFields: false,
        footer: false
    }
});
  
saveData();
renderParty();

}

function addCondition(id){

    const name =
        prompt("Condition");

    if(!name) return;

    const color =
        prompt(
            "Color (hex)",
            "#f44336"
        );

    const character =
        party.find(
            c=>c.id===id
        );

    character.conditions.push({
        name,
        color
    });

    saveData();
    renderParty();
}    

function removeCondition(
    id,
    index
){

    const character =
        party.find(
            c=>c.id===id
        );

    character.conditions.splice(
        index,
        1
    );

    saveData();
    renderParty();
}

function toggleDeathSave(
    id,
    index
){

    const character =
        party.find(
            c=>c.id===id
        );

    character.deathSaves[index] =
        !character.deathSaves[index];

    saveData();
    renderParty();
}    
    
function toggleSpellcaster(id){

    const character =
        party.find(
            c => c.id === id
        );

    if(!character) return;

    if(!character.spellSlots){
        character.spellSlots = [];
    }

    if(character.spellcaster){

        character.spellcaster = false;

    } else {

        character.spellcaster = true;

        if(
            character.spellSlots.length === 0
        ){

            const levels =
                Number(
                    prompt(
                        "How many spell levels should this character have?"
                    )
                );

            if(!levels){

                character.spellcaster = false;

                saveData();
                renderParty();

                return;
            }

            for(
                let level = 1;
                level <= levels;
                level++
            ){

                const slots =
                    Number(
                        prompt(
                            `How many Level ${level} spell slots?`
                        ) || 0
                    );

                character.spellSlots.push({
                    level,
                    current:slots,
                    max:slots
                });
            }
        }
    }

    saveData();
    renderParty();
}    

function addResource(id){

    const character =
        party.find(c=>c.id===id);

    const name =
        prompt("Resource Name");

    if(!name) return;

    const max =
        Number(
            prompt("Maximum Uses") || 1
        );

    character.resources.push({
        name,
        current:max,
        max
    });

    saveData();
    renderParty();
}

function addField(id){

    const character =
        party.find(c=>c.id===id);

    const label =
        prompt("Field Name");

    if(!label) return;

    const value =
        prompt("Value");

    character.customFields.push({
        label,
        value
    });

    saveData();
    renderParty();
}

function removeField(id,index){

    const character =
        party.find(c=>c.id===id);

    character.customFields.splice(index,1);

    saveData();
    renderParty();
}
    
function toggleResource(
    characterId,
    resourceIndex,
    clickedIndex
){

    const character =
        party.find(
            c => c.id === characterId
        );

    const resource =
        character.resources[
            resourceIndex
        ];

    // If clicking the currently last-filled dot,
    // decrease the resource by one.
    if(resource.current === clickedIndex + 1){

        resource.current--;

    } else {

        resource.current =
            clickedIndex + 1;

    }

    if(resource.current < 0){
        resource.current = 0;
    }

    saveData();
    renderParty();
}

function toggleSection(
    characterId,
    section
){

    const character =
        party.find(
            c=>c.id===characterId
        );

    character.collapsed[section] =
        !character.collapsed[section];

    saveData();
    renderParty();
}
    
function toggleSpellSlot(
    characterId,
    slotIndex,
    clickedIndex
){

    const character =
        party.find(
            c => c.id === characterId
        );

    if(!character) return;

    const slot =
        character.spellSlots[
            slotIndex
        ];

    if(
        slot.current ===
        clickedIndex + 1
    ){

        slot.current--;

    } else {

        slot.current =
            clickedIndex + 1;

    }

    if(slot.current < 0){
        slot.current = 0;
    }

    saveData();
    renderParty();
}    

function removeResource(id,index){

    const character =
        party.find(c=>c.id===id);

    character.resources.splice(index,1);

    saveData();
    renderParty();
}
    
function sortInitiative(){

    party.sort(
        (a,b)=>
            b.initiative -
            a.initiative
    );

    saveData();
    renderParty();
}

function cloneCharacter(id) {

    const original =
        party.find(c => c.id === id);

    if (!original) return;

    const amount =
        Number(
            prompt(
                `How many copies of ${original.name}?`,
                1
            )
        );

    if (!amount || amount < 1) return;

    for (let i = 1; i <= amount; i++) {

        const clone =
            JSON.parse(
                JSON.stringify(original)
            );

        clone.id =
            Date.now() + Math.floor(Math.random() * 100000) + i;

        clone.name =
            `${original.name} #${i}`;

        party.push(clone);
    }

    saveData();
    renderParty();
}
    
function deleteCharacter(id){

    const character =
        party.find(c => c.id === id);

    const confirmed = confirm(
        `Delete ${character.name}?`
    );

    if(!confirmed) return;

    party = party.filter(
        c => c.id !== id
    );

    saveData();
    renderParty();
}

function longRestAll() {

    const confirmed = confirm(
        "Perform a long rest for all characters?"
    );

    if(!confirmed) return;

    party.forEach(character => {

        character.hp.current =
            character.hp.max;

        // Resources
        character.resources.forEach(resource => {
            resource.current = resource.max;
        });

        // Spell Slots
        if(character.spellSlots){
            character.spellSlots.forEach(slot => {
                slot.current = slot.max;
            });
        }

        // Death Saves
        character.deathSaves =
            [false, false, false];
    });

    saveData();
    renderParty();
}

function exportData(){

    const data =
        JSON.stringify(
            party,
            null,
            2
        );

    navigator.clipboard.writeText(data);

    alert(
        "Character data copied to clipboard."
    );
}
function resetAllData() {

    const confirmed = confirm(
        "This will permanently delete all saved characters and data. Continue?"
    );

    if (!confirmed) return;

    localStorage.removeItem("dndParty");

    party = [];

    renderParty();

    alert("All campaign data has been reset.");
}
    
loadData();
renderParty();

</script>

</body>
</html>
